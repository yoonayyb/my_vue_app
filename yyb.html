      var maxArea = function (height) {
        let l = 0, r = height.length - 1, mianji = 0
        while (l < r) {
          let mj = 0, width = r - l


          if (height[l] < height[r]) {
            mj = height[l] * width
            l++
          } else {
            mj = height[r] * width
            r--
          }
          mianji = Math.max(mj, mianji)
        }
        return mianji
      };
      console.log(maxArea([1, 8, 6, 2, 5, 4, 8, 3, 7]));
      var moveZeroes = function (nums) {
        if (nums.length <= 1) return nums
        let l = 0, r = 0
        while (r <= nums.length - 1) {
          if (nums[r] !== 0) {
            nums[l] = nums[r];

            l++
          }
          r++

        }

        while (l <= nums.length - 1) {
          nums[l] = 0
          l++
        }
        return nums
      };

      var threeSum = function (nums) {
        nums.sort()
        console.log("🚀 ~ threeSum ~ nums:", nums)

        let arr = []
        let l = 0
        while (l < nums.length - 2) {
          let a = nums[l]
          let target = -a
          //转换成两数组之和
          let left = l + 1
          let right = nums.length - 1
          while (left < right) {
            let sum = nums[left] + nums[right]
            if (sum === target) {

              arr.push([a, nums[left], nums[right]])
              //去重
              if (nums[left] === nums[left + 1]) {
                while (nums[left] === nums[left + 1]) {
                  left++
                }
              }
              if (nums[right] === nums[right - 1]) {
                while (nums[right] === nums[right - 1]) {
                  right--
                }
              }
              left++
              right--
            } else if (sum < target) {
              left++
            } else {
              right--
            }
          }
          l++
        }
        let strArr = new Set();
        arr.forEach(res => {
          let strItem = res.sort().join(',')

          if (!strArr.has(strItem)) {
            strArr.add(strItem)
          }


        })

        strArr = Array.from(strArr)
        strArr = strArr.map(item => {
          let itemArr = item.split(',').map(num => Number(num))
          return itemArr
        })

        return strArr
      };

      var trap = function (height) {
        let l = 0, r = height.length - 1;
        let leftMax = 0, rightMax = 0, sum = 0;

        while (l <= r) {
          if (height[l] < height[r]) {
            leftMax = Math.max(leftMax, height[l]);
            sum += leftMax - height[l];
            l++;
          } else {
            rightMax = Math.max(rightMax, height[r]);
            sum += rightMax - height[r];
            r--;
          }
        }
        return sum;
      };

      var lengthOfLongestSubstring = function (s) {
        let set = new Set();
        let l = 0, maxLength = 0;

        for (let r = 0; r < s.length; r++) {

          while (set.has(s[r])) {
            set.delete(s[l]);
            l++;
          }
          set.add(s[r]);
          maxLength = Math.max(maxLength, r - l + 1);
        }

        return maxLength;
      };

      var findAnagrams = function (s, p) {
        console.log("🚀 ~ findAnagrams ~ s:", s.length)
        let result = [];
        let length = p.length;
        let point = 0
        let pMap = new Map();
        let sMap = new Map();
        for (let char of p) {
          if (pMap.has(char)) {
            pMap.set(char, pMap.get(char) + 1);
          } else {
            pMap.set(char, 1);
          }
        }
        _compareMaps = (map1, map2) => {
          // if(map1.size !== map2.size) return false;
          for (let [key, value] of map1) {
            if (map2.get(key) !== value) {
              return false;
            }
          }
          return true;
        }
        while (point <= s.length) {
          if (point >= length) {

            if (_compareMaps(pMap, sMap)) {

              result.push(point - length);
            }
            // 移除左侧字符
            sMap.set(s[point - length], sMap.get(s[point - length]) - 1);
          }
          sMap.set(s[point], (sMap.get(s[point]) || 0) + 1);

          point++
        }

        return result;
      };

      var subarraySum = function (nums, k) {
        if (nums.length === 0) return 0;

        let count = 0;
        let sum = 0;
        const prefixSumMap = new Map();
        prefixSumMap.set(0, 1); // 初始化前缀和为 0 的情况

        for (let i = 0; i < nums.length; i++) {
          sum += nums[i]; // 计算当前前缀和

          // 检查是否存在前缀和为 sum - k 的子数组
          if (prefixSumMap.has(sum - k)) {
            count += prefixSumMap.get(sum - k);
          }

          // 更新当前前缀和的出现次数
          prefixSumMap.set(sum, (prefixSumMap.get(sum) || 0) + 1);
        }

        return count;
      };
