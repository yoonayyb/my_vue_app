version: 2.1

jobs:
  deploy:
    docker:
      - image: cimg/base:2022.05
    steps:
      - checkout
      - run:
          name: Deploy to Aliyun ECS
          command: |
            scp -i $ALIYUN_SSH_KEY ./your-app-package.tar.gz $ALIYUN_USER@$ALIYUN_HOST:/path/to/deploy
            ssh -i $ALIYUN_SSH_KEY $ALIYUN_USER@$ALIYUN_HOST 'cd /path/to/deploy && tar -xzvf your-app-package.tar.gz && ./deploy-script.sh'

workflows:
  version: 2
  deploy:
    jobs:
      - deploy