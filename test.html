function cartesianProduct(...arrays) {
    console.log("🚀 ~ cartesianProduct ~ arrays:", arrays)
    return arrays.reduce((acc, current) => {
        const result = [];
        for (const a of acc) {
            for (const b of current) {
                result.push([...a, b]);
            }
        }
        return result;
    }, [[]]);
}

// 将列表还原为树形结构
function buildTree(list) {
  const map = {}; // 用于存储节点的引用
  const tree = []; // 存储最终的树形结构

  // 初始化 map，存储每个节点的引用
  list.forEach((item) => {
    map[item.id] = { ...item, children: [] };
  });
 

  // 构建树形结构
  list.forEach((item) => {
    const node = map[item.id];
    if (item.pid === 'root') {
      // 如果 pid 是 'root'，将节点直接添加到树的根节点
      tree.push(node);
    } else {
      // 否则，将节点添加到其父节点的 children 数组中
      const parent = map[item.pid];
      if (parent) {
        parent.children.push(node);
      }
    }
  });

  return tree;
}

function set(obj, keyPaths, value) {
  let current = obj; // 从对象的根开始
  for (let i = 0; i < keyPaths.length - 1; i++) {
    console.log("🚀 ~ set ~ i:", i)
    const key = keyPaths[i];
    // 如果当前路径不存在，则创建一个空对象
    if (!current[key]) {
      current[key] = {};
    }
    

    current = current[key]; // 进入下一层
    console.log("🚀 ~ set ~ current:", current)
  }
  // 设置最终路径的值
  current[keyPaths[keyPaths.length - 1]] = value;
}

function lengthOfLongestSubstring(s) {
  let maxLength = 0; // 记录最长子串的长度
  let start = 0; // 滑动窗口的起始位置
  const seen = new Map(); // 用于存储字符及其索引

  for (let end = 0; end < s.length; end++) {
    const char = s[end];
   
    // 如果字符已经存在于窗口中，更新窗口的起始位置
    if (seen.has(char) && seen.get(char) >= start) {
      
      start = seen.get(char) + 1;
    }

    // 更新字符的索引
    seen.set(char, end);

    // 计算当前窗口的长度并更新最大长度
    maxLength = Math.max(maxLength, end - start + 1);
  }

  return maxLength;
}

function reverseLinkedList(head) {
  let prev = null; // 前一个节点
  let current = head; // 当前节点
  
  while (current) {
    const next = current.next; // 暂存下一个节点
    current.next = prev; // 反转当前节点的指针
    prev = current; // 将 prev 移动到当前节点
    current = next; // 将 current 移动到下一个节点
  }

  return prev; // 返回新的头节点
}

function findMiddleNode(head) {
  let slow = head; // 慢指针
  let fast = head; // 快指针

  while (fast !== null && fast.next !== null) {
    fast = fast.next.next; // 快指针移动两步
    if (fast === null ) {
      // 如果快指针到达末尾，返回两个中间节点
      return [slow, slow.next];
    }
    slow = slow.next; // 慢指针移动一步

  }

  return slow; // 返回慢指针指向的中间节点
}

function trap(height) {
  const n = height.length;
  if (n === 0) return 0;

  const leftMax = new Array(n).fill(0);
  const rightMax = new Array(n).fill(0);

  // 计算每个柱子的左边最高柱子
  leftMax[0] = height[0];
  for (let i = 1; i < n; i++) {
    
    leftMax[i] = Math.max(leftMax[i - 1], height[i]);
  }

  // 计算每个柱子的右边最高柱子
  rightMax[n - 1] = height[n - 1];
  for (let i = n - 2; i >= 0; i--) {
    
    rightMax[i] = Math.max(rightMax[i + 1], height[i]);
  }

  // 计算总的雨水量
  let totalWater = 0;
  for (let i = 0; i < n; i++) {
    totalWater += Math.min(leftMax[i], rightMax[i]) - height[i];
  }
  console.log("🚀 ~ trap ~ leftMax:", leftMax)
  console.log("🚀 ~ trap ~ rightMax:", rightMax)

  return totalWater;
}

const requestIdleCallbackPolyfill = (() => {
    // 检查浏览器是否支持原生 requestIdleCallback
    if (typeof window.requestIdleCallback === 'function') {
        return window.requestIdleCallback; // 如果支持，直接返回原生方法
    }

    // 如果不支持，返回 Polyfill 实现
    return function(callback, options = {}) {
        const start = Date.now(); // 记录开始时间
        const timeout = options.timeout || 50; // 默认超时时间为 50ms
        console.log("🚀 ~ timeout:", timeout)

        return setTimeout(() => {
            const elapsed = Date.now() - start; // 计算已过去的时间
            callback({
                timeRemaining: () => Math.max(0, timeout - elapsed), // 剩余时间
                didTimeout: elapsed >= timeout, // 是否因超时被强制执行
            });
        }, 1); // 使用 setTimeout 模拟
    };
})();
console.log("🚀 ~ requestIdleCallbackPolyfill:", requestIdleCallbackPolyfill)
requestIdleCallbackPolyfill((deadline) => {
    if (deadline.didTimeout) {
        console.log("任务因超时被强制执行,",`${deadline.timeRemaining()}ms`);
    } else {
        console.log(`任务在空闲时间内执行，剩余时间: ${deadline.timeRemaining()}ms`);
    }
});

    let map = new Map()
    nums.forEach((v,i)=>{
        if(map.has(v)){
           map.set(v, [...map.get(v),i])
          
        }else{
          map.set(v, [i])
        }
    })
    console.log("🚀 ~ twoSum ~ map:", map)

    nums.sort((a,b) => a-b)
   

    
   
    while(l<=r){
        let sum = nums[l] + nums[r]
        
        if(sum ===target){
            
           return result = nums[l] === nums[r] ? [map.get(nums[l])[0], map.get(nums[l])[1]] : [map.get(nums[l])[0],map.get(nums[r])[0]]
        }else if(sum < target){
            l++
        }else{
            r--
            
        }
    }

Function.prototype.myCall = (content, ...args) => {
  content = content || globalThis;
  const fnSymbol = Symbol('fn');
  content[fnSymbol] = this;
  const result = content[fnSymbol](...args);
  delete content[fnSymbol];
  return result;
};

Function.prototype.mybind = function(content, ...args) {
  const self = this;
  return function(...innerArgs) {
    return self.myCall(content, ...args, ...innerArgs);
  };
};
Function.prototype.myApply = function(content, args) {
  content = content || globalThis;
  const fnSymbol = Symbol('fn');
  content[fnSymbol] = this;
  let result;
  if (!args) {
    result = content[fnSymbol]();
  } else {
    result = content[fnSymbol](...args);
  }
  delete content[fnSymbol];
  return result;
};


//节流
function throttle(fn, delay) {
  let timer = null;
  return function(...args) {
    if (!timer) {
      timer = setTimeout(() => {
        fn.apply(this, args);
        timer = null;
      }, delay);
    }
  };
}
//防抖
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => {
      fn.apply(this, args);
    }, delay);
  };
}
